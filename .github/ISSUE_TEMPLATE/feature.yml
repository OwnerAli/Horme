name: AI Feature Request

description: Request an AI-generated feature

body:

  - type: dropdown
    id: plugin
    attributes:
      label: Skill
      description: Select the AI skill to use
      options:
        - Xenith
    validations:
      required: true

  - type: dropdown
    id: skill
    attributes:
      label: Skill
      description: Select the AI skill to use
      options:
        - Action
        - Condition
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
