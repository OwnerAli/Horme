name: AI Implementation
on:
  issues:
    types:
      - labeled
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  process:
    if: github.event.label.name == 'hermes-ready'
    runs-on: ubuntu-latest
    environment: agents
    steps:
      # -----------------------
      # Checkout full repo
      # (IMPORTANT for GitPython + PR branch creation)
      # -----------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.OWNERALI_PAT }}
      # -----------------------
      # Python setup
      # -----------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # -----------------------
      # Install dependencies
      # -----------------------
      - name: Install Dependencies
        run: pip install -r requirements.txt
      # -----------------------
      # Configure Git identity
      # (REQUIRED for commits + PR branch pushes)
      # -----------------------
      - name: Configure Git
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
      # -----------------------
      # Run pipeline
      # -----------------------
      - name: Run Pipeline
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          OWNERALI_PAT: ${{ secrets.OWNERALI_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/process_issue.py
